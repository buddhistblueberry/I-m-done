name: Build & Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release Signed APK
    # Use a specific runner image instead of ubuntu-latest. During GitHub
    # Actions runner congestion, ubuntu-latest (the most popular label) gets
    # queued the longest; pinning to a specific image often allocates faster.
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore_keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Decode the release keystore (stored as a base64 GitHub secret) into a
      # file the Gradle signing config can read. This makes every CI build
      # use the SAME signing key, so updates install over previous builds and
      # the in-app updater stops failing with signature mismatches.
      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > $HOME/release.keystore
          echo "KEYSTORE_FILE=$HOME/release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          # Sanity check
          test -s $HOME/release.keystore && echo "keystore decoded OK ($(wc -c < $HOME/release.keystore) bytes)" || (echo "keystore missing/empty" && exit 1)

      - name: Build signed release APK
        env:
          CI_BUILD_NUMBER: ${{ github.run_number }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Verify APK signature
        run: |
          APK="app/build/outputs/apk/release/app-release.apk"
          ls -la "$APK"
          # Find the build-tools apksigner and run it with the 'verify' subcommand.
          APKSIGNER="$(ls $ANDROID_HOME/build-tools/*/apksigner | tail -1)"
          echo "Using apksigner: $APKSIGNER"
          "$APKSIGNER" verify --verbose --print-certs "$APK" | sed -n '1,25p'

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/[^"]*"\([^"]*\)".*/\1/')
          echo "tag=v${VERSION}-build${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "name=v${VERSION} (build ${{ github.run_number }})" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            Signed release APK built automatically from the latest commit.

            **What changed:** Builds are now signed with a permanent release
            key (not a per-run debug key), so this APK installs cleanly over
            previous builds and the in-app updater works correctly.

            Download the APK below and sideload it on your Android device.
            Enable "Install from unknown sources" in settings if prompted.
          files: app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: true
