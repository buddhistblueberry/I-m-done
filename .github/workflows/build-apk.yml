name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-24.04
    env:
      HAS_SECRETS: ${{ secrets.KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Decode release keystore only when secrets are available (original repo)
      - name: Decode release keystore
        if: env.HAS_SECRETS == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > $HOME/release.keystore
          echo "KEYSTORE_FILE=$HOME/release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> $GITHUB_ENV
          echo "KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> $GITHUB_ENV
          test -s $HOME/release.keystore && echo "keystore decoded OK" || exit 1

      # Build signed release (original repo) or debug (forks)
      - name: Build APK
        env:
          CI_BUILD_NUMBER: ${{ github.run_number }}
        run: |
          if [ "$HAS_SECRETS" = "true" ]; then
            ./gradlew assembleRelease --stacktrace
          else
            ./gradlew assembleDebug --stacktrace
          fi

      - name: Locate APK
        id: apk
        run: |
          if [ "$HAS_SECRETS" = "true" ]; then
            echo "path=app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
            echo "name=app-release.apk" >> $GITHUB_OUTPUT
          else
            echo "path=app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT
            echo "name=app-debug.apk" >> $GITHUB_OUTPUT
          fi

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/[^"]*"\([^"]*\)".*/\1/')
          echo "tag=v${VERSION}-build${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "name=v${VERSION} (build ${{ github.run_number }})" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            APK built automatically from the latest commit.

            Download and sideload on your Android device.
            Enable "Install from unknown sources" in settings if prompted.
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
