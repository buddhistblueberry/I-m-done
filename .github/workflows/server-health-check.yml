name: Daily Server Health Check

# Runs every day at 06:00 UTC, and on manual dispatch. Probes every server in
# working-servers.json, updates reliability scores + enabled flags, and
# auto-commits the result back to main. The Android app fetches this file at
# runtime (raw.githubusercontent.com), so a daily push keeps every install's
# server list fresh without an app update.
on:
  schedule:
    - cron: "0 6 * * *"   # daily 06:00 UTC
  workflow_dispatch:       # manual "Run workflow" button

permissions:
  contents: write           # needed to push the auto-commit

concurrency:
  group: server-health-check
  cancel-in-progress: false

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run server health check
        run: |
          python3 scripts/server_health_check.py \
            --input working-servers.json \
            --output working-servers.json \
            --timeout 15 \
            --max-workers 8

      - name: Show diff
        run: |
          git --no-pager diff --stat working-servers.json || true
          git --no-pager diff working-servers.json | head -200 || true

      - name: Commit updated server list
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Only commit if something actually changed.
          if git diff --quiet working-servers.json; then
            echo "No changes — skipping commit."
          else
            git add working-servers.json
            git commit -m "chore(servers): daily health-check update [skip ci]

            Auto-generated by the Daily Server Health Check workflow.
            Updated reliability scores + enabled flags from live probes of
            $(date -u +%Y-%m-%dT%H:%M:%SZ)."
            git push
          fi
